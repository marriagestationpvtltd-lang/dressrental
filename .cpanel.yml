---
# .cpanel.yml — cPanel Git auto-deployment script
# Runs automatically every time you push to GitHub and cPanel pulls the changes.
#
# NO TERMINAL NEEDED — cPanel executes every task below for you automatically.
#
# Setup (one-time, all done through the cPanel web interface):
#   1. cPanel → Git™ Version Control → Create Repository
#      Clone URL : https://github.com/marriagestationpvtltd-lang/dressrental.git
#      Repository Path: /home/cpanelusername/public_html
#   2. Replace "cpanelusername" on the DEPLOYPATH line below with your real
#      cPanel username, commit, and push to GitHub.
#   3. cPanel → File Manager → navigate to public_html → upload a configured
#      .env file (copy .env.example, fill in DB credentials and admin details).
#      You can skip this — step 3 below will create one from .env.example
#      automatically, but you MUST then edit it with your real credentials.
#   4. cPanel → Git™ Version Control → Manage → "Deploy HEAD Commit"
#      (after the first deploy, every git push triggers this automatically).
#
# The DEPLOYPATH below must match the document root of your site in cPanel.
# Typically: /home/CPANELUSERNAME/public_html
# If the app lives in a subdirectory (e.g. /home/user/public_html/rental),
# update DEPLOYPATH accordingly and point your domain to that folder.

deployment:
  tasks:
    - export DEPLOYPATH=/home/cpanelusername/public_html/

    # 1. Copy repository files to the web root
    - /bin/cp -R . $DEPLOYPATH

    # 2. Install/update PHP dependencies (no dev packages on production)
    - cd $DEPLOYPATH && composer install --no-dev --optimize-autoloader --no-interaction

    # 3. Create .env from the example template if it does not yet exist.
    #    IMPORTANT: after the very first deploy, open .env in cPanel File Manager
    #    and fill in your real DB credentials, APP_URL, and payment keys.
    - cd $DEPLOYPATH && test -f .env || cp .env.example .env

    # 4. Generate APP_KEY if the field is still blank or incomplete (runs only once — safe).
    #    Laravel keys are base64-encoded 32 bytes = 44 characters (43 base64 chars + 1 padding '=').
    - cd $DEPLOYPATH && grep -qE 'APP_KEY=base64:[A-Za-z0-9+/]{43}=' .env || php artisan key:generate --force

    # 5. Build front-end assets (CSS / JS via Vite + Tailwind).
    #    Requires Node.js ≥ 20 on the server.
    #    If your host does not have Node.js, build locally with
    #      npm ci && npm run build
    #    and commit the public/build/ folder before pushing.
    - cd $DEPLOYPATH && if command -v npm >/dev/null 2>&1; then npm ci && npm run build; else echo "Node.js not found — skipping front-end build. Pre-build assets locally and commit public/build/ if the site has no styling."; fi

    # 6. Run any new database migrations (safe — never deletes existing data)
    - cd $DEPLOYPATH && php artisan migrate --force

    # 7. Clear and rebuild all caches
    - cd $DEPLOYPATH && php artisan config:cache
    - cd $DEPLOYPATH && php artisan route:cache
    - cd $DEPLOYPATH && php artisan view:cache
    - cd $DEPLOYPATH && php artisan event:cache
